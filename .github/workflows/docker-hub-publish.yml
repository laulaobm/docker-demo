name: DockerHub Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/docker-spring-demo
  COMPOSE_FILE: docker-compose.yml

jobs:
  build-and-push-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} build --no-cache app
          
          docker tag ${{ env.IMAGE_NAME }} ${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }} ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          
          docker push ${{ env.IMAGE_NAME }} --all-tags